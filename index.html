<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Soundboard</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #222;
            color: white;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(5, 120px);
            gap: 15px;
            justify-content: center;
            margin-top: 40px;
        }
        button {
            padding: 20px;
            font-size: 14px;
            border: none;
            border-radius: 10px;
            background: #444;
            color: white;
            cursor: pointer;
        }
        button:hover {
            background: #666;
        }
    </style>
</head>
<body>

<h1>🎵 Soundboard</h1>

<div class="grid">
    <button onclick="playSound(0)">trumpet</button>
    <button onclick="playSound(1)">ohhh noo!</button>
    <button onclick="playSound(2)">oh my god!</button>
    <button onclick="playSound(3)">oh brother this guy stinks!</button>
    <button onclick="playSound(4)">speedwagon!</button>
    <button onclick="playSound(5)">za warudo</button>
    <button onclick="playSound(6)">ora ora!</button>
    <button onclick="playSound(7)">useless useless!</button>
    <button onclick="playSound(8)">za hando</button>
    <button onclick="playSound(9)">my leg</button>
    <button onclick="playSound(10)">dissapointed </button>
    <button onclick="playSound(11)">doojyaan</button>
    <button onclick="playSound(12)">never gonn give you up</button>
    <button onclick="playSound(13)">i got this</button>
    <button onclick="playSound(14)">faaaaahhh</button>
    <button onclick="playSound(15)">mad in hevan</button>
    <button onclick="playSound(16)">Sound 17</button>
    <button onclick="playSound(17)">Sound 18</button>
</div>

<script>
    const sounds = [
        "sounds/trumpet_fall.mp3",
        "sounds/oh noo.mp3",
        "sounds/oh my good.mp3",
        "sounds/sound4.mp3",
        "sounds/sound5.mp3",
        "sounds/sound6.mp3",
        "sounds/sound7.mp3",
        "sounds/sound8.mp3",
        "sounds/sound9.mp3",
        "sounds/sound10.mp3",
        "sounds/sound11.mp3",
        "sounds/sound12.mp3",
        "sounds/sound13.mp3",
        "sounds/sound14.mp3",
        "sounds/sound15.mp3",
        "sounds/sound16.mp3",
        "sounds/sound17.mp3",
        "sounds/sound18.mp3",
        
    ];

    function playSound(index) {
        let audio = new Audio(sounds[index]);
        audio.play();
    }
</script>

</body>
</html>
