<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Soundboard</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #222;
            color: white;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(5, 120px);
            gap: 15px;
            justify-content: center;
            margin-top: 40px;
        }
        button {
            padding: 20px;
            font-size: 14px;
            border: none;
            border-radius: 10px;
            background: #444;
            color: white;
            cursor: pointer;
        }
        button:hover {
            background: #666;
        }
    </style>
</head>
<body>

<h1>🎵 Soundboard</h1>

<div class="grid">
    <button onclick="playSound(0)">Sound 1</button>
    <button onclick="playSound(1)">Sound 2</button>
    <button onclick="playSound(2)">Sound 3</button>
    <button onclick="playSound(3)">Sound 4</button>
    <button onclick="playSound(4)">Sound 5</button>
    <button onclick="playSound(5)">Sound 6</button>
    <button onclick="playSound(6)">Sound 7</button>
    <button onclick="playSound(7)">Sound 8</button>
    <button onclick="playSound(8)">Sound 9</button>
    <button onclick="playSound(9)">Sound 10</button>
</div>

<script>
    const sounds = [
        "sounds/trumpet_fall.mp3",
        "sounds/sound2.mp3",
        "sounds/sound3.mp3",
        "sounds/sound4.mp3",
        "sounds/sound5.mp3",
        "sounds/sound6.mp3",
        "sounds/sound7.mp3",
        "sounds/sound8.mp3",
        "sounds/sound9.mp3",
        "sounds/sound10.mp3"
    ];

    function playSound(index) {
        let audio = new Audio(sounds[index]);
        audio.play();
    }
</script>

</body>
</html>
